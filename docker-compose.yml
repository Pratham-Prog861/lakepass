version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: lakepass-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-lakepass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - lakepass_postgres_data:/var/lib/postgresql/data

volumes:
  lakepass_postgres_data:
    driver: local
